<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026大巨蛋靜思法髓妙蓮華_大中區報名表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tz-blue: #1A365D; }
        
        body { 
            background-color: #e6f0fa; /* 莊嚴平靜的慈濟淺藍 */
            font-family: "Microsoft JhengHei", sans-serif; 
            position: relative; 
            min-height: 100vh;
        }
        
        /* 蓮華水印背景設定 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://cdn.pixabay.com/photo/2013/07/13/10/41/lotus-157648_1280.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 80% auto;
            opacity: 0.08; 
            z-index: -1;
        }

        .form-card { 
            background: white; 
            border-radius: 12px; 
            padding: 2rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 1.5rem; 
        }
        
        .section-title { 
            color: var(--tz-blue); 
            font-weight: bold; 
            border-left: 5px solid var(--tz-blue); 
            padding-left: 0.75rem; 
            margin-bottom: 1.25rem; 
            font-size: 1.1rem; 
        }
        
        .input-box { 
            width: 100%; border: 1px solid #d1d5db; border-radius: 8px; 
            padding: 10px; outline: none; transition: 0.2s; 
        }
        
        .input-box:focus { border-color: var(--tz-blue); box-shadow: 0 0 0 2px rgba(26, 54, 93, 0.1); }
        
        .agreement-text { 
            background-color: #f9fafb; border: 1px solid #e5e7eb; 
            padding: 1rem; border-radius: 8px; font-size: 0.875rem; 
            color: #4b5563; line-height: 1.6; 
        }
    </style>
</head>
<body class="py-10 px-4 md:px-0">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10 px-2">
            <h1 class="text-2xl font-bold text-[#1A365D] tracking-widest mb-4">2026大巨蛋靜思法髓妙蓮華_大中區報名表</h1>
            <div class="text-gray-600 space-y-1">
                <p class="text-base font-medium">誠摯邀請您加入這歷史性的一刻</p>
                <p style="font-size: 10px;" class="font-medium text-gray-500">期待在傳法的畫面中——有你、有我、也有他 🤍</p>
            </div>
        </header>

        <form id="perfForm">
            <div class="form-card border-2 border-blue-100">
                <h2 class="section-title">一、個資蒐集同意書</h2>
                <div class="agreement-text mb-4 text-xs">
                    <p class="font-bold mb-2">財團法人中華民國佛教慈濟慈善事業基金會蒐集個人資料告知事項暨當事人同意書</p>
                    <p>您已閱讀、瞭解並同意接受本同意書之規定，並同意本會於所列蒐集目的之必要範圍內，蒐集、處理及利用本人之個人資料。若您未滿十八歲，您確認已經法定代理人同意。若您是代填報者，您保證已獲得所有人同意。</p>
                </div>
                <div class="flex items-center space-x-6">
                    <span class="text-sm font-bold text-gray-700">是否同意：</span>
                    <label class="flex items-center cursor-pointer"><input type="radio" name="agreement" value="同意" required class="mr-2"> 同意</label>
                    <label class="flex items-center cursor-pointer"><input type="radio" name="agreement" value="不同意" class="mr-2"> 不同意</label>
                </div>
            </div>

            <div class="form-card">
                <h2 class="section-title">二、基本資料</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">姓名 (必填)</label>
                        <input type="text" name="name" required class="input-box" placeholder="請填寫本名">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">身分</label>
                        <select name="identity" class="input-box">
                            <option>委員</option><option>慈誠</option><option>見習/培訓</option>
                            <option>慈青</option><option>慈二三代</option><option>社區志工/會眾</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">連絡電話 (請輸入10位數字，不加 -)</label>
                        <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" class="input-box" placeholder="09xxxxxxxx">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">身份證字號 (重複報名辨別用)</label>
                        <input type="text" name="id_number" required class="input-box" placeholder="請填寫身份證字號" pattern="[A-Z]{1}[1-2]{1}[0-9]{8}">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">出生年月日</label>
                        <input type="date" name="birthday" class="input-box">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">性別</label>
                        <div class="flex space-x-8">
                            <label class="flex items-center cursor-pointer"><input type="radio" name="gender" value="男" checked class="mr-2"> 男</label>
                            <label class="flex items-center cursor-pointer"><input type="radio" name="gender" value="女" class="mr-2"> 女</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h2 class="section-title">三、緊急聯絡資訊</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">緊急聯絡人姓名 (必填)</label>
                        <input type="text" name="emergency_name" required class="input-box" placeholder="請填寫姓名">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">與報名者關係 (必填)</label>
                        <input type="text" name="emergency_rel" required class="input-box" placeholder="例如：夫妻、父子">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">緊急聯絡人電話 (不加 -)</label>
                        <input type="tel" name="emergency_phone" required pattern="[0-9]{10}" class="input-box" placeholder="09xxxxxxxx">
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h2 class="section-title">四、所屬區域</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-7
